<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página de Productos</title>
  <link rel="stylesheet" href="../css/productos.css">
</head>
<body>
  <div class="container">
    <!-- Barra lateral: Categorías y filtros -->
    <div class="sidebar">
      <h2>Categorías</h2>
      <ul>
        <li><a href="#" data-category="todos" class="active">Todos</a></li>
        <li><a href="#" data-category="electronica">Electrónica</a></li>
        <li><a href="#" data-category="ropa">Ropa</a></li>
        <li><a href="#" data-category="hogar">Hogar</a></li>
      </ul>
      <div class="filter-section">
        <h3>Filtros</h3>
        <label for="price-range">Rango de precio</label>
        <input type="range" id="price-range" min="0" max="1000" value="1000">
        <span id="price-value">1000</span>
        <label for="brand-select">Marca</label>
        <select id="brand-select">
          <option value="todos">Todas</option>
          <option value="marcaA">Marca A</option>
          <option value="marcaB">Marca B</option>
          <option value="marcaC">Marca C</option>
        </select>
        <button id="apply-filters" style="margin-top:15px;">Aplicar filtros</button>
      </div>
    </div>

    <!-- Contenido principal: Tarjetas de productos y paginación -->
    <div class="main-content">
      <div class="product-grid" id="product-grid">
        <!-- Aquí se cargarán las tarjetas de productos -->
      </div>
      <ul class="pagination" id="pagination">
        <!-- Aquí se generará la paginación -->
      </ul>
    </div>
  </div>
  <script src="../java/productos.js"></script>
</body>
</html>
